<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#C9A84C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Na Régua">
<link rel="apple-touch-icon" sizes="512x512" href="icon.jpg">
<link rel="icon" type="image/jpeg" href="icon.jpg">
<title>Na Régua</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A0A; --card:#141414; --modal:#181818; --border:#252525; --border2:#2E2E2E;
    --gold:#C9A84C; --gold-l:#E8C870; --gold-m:#7A6030;
    --green:#22C55E; --green-bg:#052E16; --red:#EF4444; --red-bg:#2D0808;
    --amber:#F59E0B; --amber-bg:#2D1B00; --blue:#60A5FA; --blue-bg:#0D1B2E;
    --text:#F5F5F5; --text-2:#9CA3AF; --text-3:#6B7280;
    --surface:#141414; --inp-bg:#0F0F0F; --inner:#0F0F0F;
  }
  body.tema-claro{
    --bg:#F2F2EE; --card:#FFFFFF; --modal:#FFFFFF; --border:#E0E0D8; --border2:#D0D0C8;
    --text:#1A1A1A; --text-2:#5A5A5A; --text-3:#8A8A8A;
    --surface:#FFFFFF; --inp-bg:#F8F8F4; --inner:#F0F0EC;
    --green-bg:#DCFCE7; --red-bg:#FEE2E2; --amber-bg:#FEF3C7; --blue-bg:#DBEAFE;
    --gold-m:#B8922A;
  }
  body.tema-claro ::-webkit-scrollbar-thumb{background:#C8C8C0}
  body.tema-claro #sidebar{background:#1A1A1A}
  body.tema-claro .card{box-shadow:0 1px 4px rgba(0,0,0,.07)}
  body.tema-claro #topbar{background:rgba(240,240,236,.97)}
  body.tema-claro .modal{box-shadow:0 8px 32px rgba(0,0,0,.15)}
  *{box-sizing:border-box;margin:0;padding:0}
  html{touch-action:manipulation}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:'DM Sans','Segoe UI',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#2A2A2A;border-radius:4px}

  /* ===== LAYOUT ===== */
  #app{display:flex;min-height:100vh;min-height:100dvh}

  /* Sidebar desktop (rail de 70px) */
  #sidebar{
    width:70px; flex-shrink:0; background:#0D0D0D; border-right:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; padding:14px 0; gap:2px;
    position:sticky; top:0; height:100vh; height:100dvh; z-index:50;
  }
  .side-logo{width:38px;height:38px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold),var(--gold-m));
    display:flex;align-items:center;justify-content:center;margin-bottom:18px}
  .nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;width:54px;
    padding:9px 6px;border-radius:10px;background:transparent;border:1px solid transparent;
    color:var(--text-3);transition:all .2s}
  .nav-btn span{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
  .nav-btn.active{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.2);color:var(--gold)}
  .nav-btn .lbl-full{display:none}
  .side-head{display:none}

  /* Backdrop (só mobile) */
  #backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1100;
    opacity:0;pointer-events:none;transition:opacity .3s ease}
  #backdrop.show{opacity:1;pointer-events:auto}

  /* Main */
  main{flex:1;min-width:0;width:100%;overflow-y:auto}
  #topbar{
    display:flex;align-items:center;gap:10px;
    padding:10px 20px;
    padding-top:max(10px, env(safe-area-inset-top));
    position:sticky;top:0;z-index:900;
    background:rgba(13,13,13,.96);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border)
  }
  #topbar .burger{display:none}
  #topbar .brand{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
  #topbar .brand span{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #topbar .top-action{background:none;border:1px solid var(--border);border-radius:9px;padding:8px;color:var(--gold);display:flex;align-items:center;position:relative;flex-shrink:0;cursor:pointer}
  #topbar .top-action:hover{background:rgba(201,168,76,.08)}
  #lembrete-badge{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center;line-height:16px}
  #view{padding:22px}

  /* ===== COMPONENTES ===== */
  .sec-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px}
  .sec-head h1{font-size:22px;font-weight:700}
  .sec-head p{color:var(--text-2);font-size:12px;margin-top:3px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
  .btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text-2);transition:opacity .15s}
  .btn:hover{opacity:.85}
  .btn-sm{padding:5px 10px;font-size:11px}
  .btn-primary{background:var(--gold);border-color:var(--gold);color:#0A0A0A}
  .btn-green{background:var(--green-bg);border-color:var(--green);color:var(--green)}
  .btn-red{background:var(--red-bg);border-color:var(--red);color:var(--red)}
  .btn-amber{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
  .inp{width:100%;padding:10px 14px;background:var(--inp-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
  .inp:focus{border-color:var(--gold);border-width:1.5px}
  .lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--text-3);text-transform:uppercase;margin-bottom:6px}
  .field{margin-bottom:14px}
  select.inp{appearance:none;cursor:pointer}
  textarea.inp{resize:vertical;min-height:60px}
  .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.05em;display:inline-block}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .empty{text-align:center;padding:48px;color:var(--text-3)}
  .empty p{margin:12px 0 16px;font-size:14px}
  .list-item{margin-bottom:10px}
  .actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;background:var(--inner);border:1px solid var(--border);border-radius:20px;font-size:12px}
  .chip button{background:none;border:none;color:var(--red);font-size:14px;line-height:1;padding:0}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1300;padding:16px}
  .modal{background:var(--modal);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .modal-head h2{font-size:18px;font-weight:700}
  .modal-head button{background:none;border:none;color:var(--text-3)}
  .modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}

  /* Toggle entrada/saida + pagamento */
  .toggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
  .toggle{padding:10px;border-radius:8px;border:2px solid var(--border);background:transparent;color:var(--text-3);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px}
  .toggle.on-green{border-color:var(--green);background:var(--green-bg);color:var(--green)}
  .toggle.on-red{border-color:var(--red);background:var(--red-bg);color:var(--red)}
  .toggle.on-gold{border-color:var(--gold);background:rgba(201,168,76,.1);color:var(--gold)}
  .pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .pay{padding:8px 6px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-2);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:4px}
  .pay.on{border-color:var(--gold);background:rgba(201,168,76,.1);color:var(--gold)}

  /* Tabs config */
  .tabs{display:flex;gap:3px;margin-bottom:22px;background:var(--inner);padding:4px;border-radius:10px;overflow-x:auto}
  .tab{flex:1;min-width:fit-content;padding:7px 8px;border-radius:7px;border:none;background:transparent;color:var(--text-3);font-size:12px;font-weight:600;white-space:nowrap}
  .tab.active{background:var(--card);color:var(--gold)}

  @keyframes spin{to{transform:rotate(360deg)}}
  /* ===== PIN ===== */
  #pin-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .pin-dot{width:15px;height:15px;border-radius:50%;background:var(--border2);transition:background .15s,transform .15s}
  .pin-dot.filled{background:var(--gold);transform:scale(1.15)}
  .pin-dot.erro{background:var(--red)}
  .kp-btn{width:74px;height:74px;border-radius:50%;border:1px solid var(--border);background:var(--surface);font-size:24px;font-weight:500;color:var(--text);cursor:pointer;transition:background .1s;display:flex;align-items:center;justify-content:center}
  .kp-btn:active,.kp-btn:focus{background:var(--border2);outline:none}
  .kp-empty{width:74px;height:74px}
  @media (max-width:768px){
    #sidebar{
      position:fixed; top:0; left:0; bottom:0; height:100vh; height:100dvh;
      width:248px; max-width:80vw; align-items:stretch;
      padding:16px; padding-top:max(16px, env(safe-area-inset-top));
      transform:translateX(-100%); transition:transform .3s ease; z-index:1200;
      overflow-y:auto; -webkit-overflow-scrolling:touch; gap:4px;
    }
    #sidebar.open{transform:translateX(0)}
    .side-logo{margin-bottom:0}
    .side-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .side-head .brand{display:flex;align-items:center;gap:10px}
    .side-head .brand span{font-weight:700;font-size:14px}
    .side-head button{background:none;border:none;color:var(--text-3)}
    .nav-btn{flex-direction:row;width:100%;justify-content:flex-start;gap:12px;padding:12px 14px;color:var(--text-2)}
    .nav-btn span.lbl-short{display:none}
    .nav-btn .lbl-full{display:inline;font-size:14px;font-weight:600;text-transform:none;letter-spacing:0}
    #topbar{padding:10px 14px;padding-top:max(10px, env(safe-area-inset-top));gap:10px}
    #topbar .burger{background:none;border:1px solid var(--border);border-radius:9px;padding:8px;color:var(--gold);display:flex;align-items:center}
    #topbar .brand span{font-size:15px}
    .row2{grid-template-columns:1fr}
    .row3{grid-template-columns:1fr 1fr 1fr}
    #view{padding:14px}
    .sec-head{flex-direction:column;align-items:stretch}
    .sec-head .btn-primary{align-self:flex-start}
  }
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="side-head">
      <div class="brand">
        <div class="side-logo" style="width:36px;height:36px;margin:0"></div>
        <span id="side-brand">Minha Loja</span>
      </div>
      <button onclick="closeDrawer()" aria-label="Fechar menu"></button>
    </div>
    <div class="side-logo only-desktop"></div>
    <div id="nav-items"></div>
  </nav>

  <div id="backdrop" onclick="closeDrawer()"></div>

  <main>
    <header id="topbar">
      <button class="burger" onclick="openDrawer()" aria-label="Abrir menu"></button>
      <div class="brand" id="topbar-brand"><span>Na Régua</span></div>
      <button class="top-action" id="btn-modo-op" onclick="toggleModoOp()" title="Modo Operação" aria-label="Modo Operação"></button>
      <button class="top-action" id="btn-tema" onclick="toggleTema()" aria-label="Alternar tema"></button>
      <button class="top-action" id="btn-sino" onclick="setView('lembretes')" aria-label="Lembretes"><span id="lembrete-badge"></span></button>
      <button class="top-action" id="btn-novo" onclick="modalAgenda()" aria-label="Novo agendamento"></button>
    </header>
    <div id="view"></div>
  </main>
</div>
<div id="modal-root"></div>
<div id="auth-root"></div>
<div id="pin-overlay"></div>
<div id="modo-op-overlay" style="display:none;position:fixed;inset:0;z-index:1290;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
/* ============ LOJA (multi-inquilino) ============ */
const _qs = new URLSearchParams(location.search);
const lojaId = (_qs.get('loja')||'').trim();
const PFX = lojaId + ':';
if(!lojaId){
  document.body.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;text-align:center;font-family:system-ui;color:#9CA3AF;background:#0A0A0A"><div><div style="font-size:40px;margin-bottom:12px">&#128274;</div><div style="font-size:16px;color:#F5F5F5;font-weight:700;margin-bottom:6px">Loja nao especificada</div><div style="font-size:13px">Abra o sistema pelo link da loja, com <code style="color:#C9A84C">?loja=IDENTIFICADOR</code> na URL.</div></div></div>';
  throw new Error('lojaId ausente na URL (?loja=)');
}

/* ============ STORAGE (localStorage com fallback em memória) ============ */
const LS = {
  mem:{},
  get(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return this.mem[k]||null; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ this.mem[k]=v; } }
};

/* ============ FIREBASE (NUVEM PRINCIPAL) ============ */
const firebaseConfig = {
  apiKey:"AIzaSyBounnQvZf5h7rQ7-t2RzZvTziQNpq6nCA",
  authDomain:"naregua-lojas.firebaseapp.com",
  projectId:"naregua-lojas",
  storageBucket:"naregua-lojas.firebasestorage.app",
  messagingSenderId:"1002682531913",
  appId:"1:1002682531913:web:b638a2cafc167225c8bf98"
};
let db = null;
try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
}catch(e){ console.warn('Firebase init:', e); }
/* dados desta loja ficam em lojas/{lojaId}/dados/{doc} */
function dadosCol(){ return db.collection('lojas').doc(lojaId).collection('dados'); }
  /* ============ AUTH ============ */
let auth = null;
let currentUser = null;
let currentRole = null; // 'dono' ou 'funcionario'
let currentBarbeiro = null; // barbeiro vinculado ao usuário logado

try{ auth = firebase.auth(); }catch(e){ console.warn('Auth init:', e); }

function getUsuarioLogado(){ return currentUser; }
function isDono(){ return currentRole === 'dono'; }
function isFuncionario(){ return currentRole !== null && currentRole !== 'dono'; }

async function carregarRole(uid){
  try{
    const doc = await db.collection('usuarios').doc(uid).get();
    if(doc.exists){
      const d = doc.data();
      currentBarbeiro = d.barbeiro || null;
      if(d.lojaId && d.lojaId !== lojaId) return '__OUTRA_LOJA__';
      return d.role || 'funcionario';
    }
  }catch(e){}
  return '__SEM_ACESSO__';
}

if(auth){
  auth.onAuthStateChanged(async user => {
    currentUser = user;
    if(user){
      currentRole = await carregarRole(user.uid);
      if(currentRole==='__OUTRA_LOJA__' || currentRole==='__SEM_ACESSO__'){
        const _m = currentRole==='__OUTRA_LOJA__' ? 'Este login pertence a outra loja.' : 'Este login nao tem acesso a esta loja.';
        await auth.signOut(); mostrarTelaLogin(_m); return;
      }
      // qualquer usuário com barbeiro vinculado: pré-seleciona na agenda
      if(currentBarbeiro){
        agFiltroBarb = currentBarbeiro;
        agTimelineBarb = currentBarbeiro;
      }
      document.getElementById('auth-root').innerHTML = '';
      boot();
    } else {
      currentRole = null;
      currentBarbeiro = null;
      mostrarTelaLogin();
    }
  });
} else {
  boot();
}

/* ============ SUPABASE (NUVEM ALTERNATIVA — opcional) ============ */
// Após criar sua conta no supabase.com, cole aqui o URL e a chave anon do seu projeto:
const SB_URL = ''; // ex: https://xyzabc.supabase.co
const SB_KEY = ''; // ex: eyJhbGciOiJIUzI1NiIsInR5...

const cloudAtivo = () => !!db || (SB_URL && SB_URL.length > 10);
const sbHeaders = () => ({'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'});

function setCloudStatus(msg, cor){
  let el=document.getElementById('cloud-status');
  if(!el){ el=document.createElement('div'); el.id='cloud-status';
    el.style.cssText='position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:#141414;border:1px solid #252525;font-size:11px;padding:5px 14px;border-radius:20px;z-index:2000;white-space:nowrap;pointer-events:none';
    document.body.appendChild(el); }
  el.textContent=msg; el.style.color=cor||'#9CA3AF';
  clearTimeout(el._t); el._t=setTimeout(()=>{ const e=document.getElementById('cloud-status'); if(e)e.remove(); },3000);
}

async function cloudSave(key, valor){
  if(!cloudAtivo()) return;
  try{
    await fetch(SB_URL+'/rest/v1/dados',{method:'POST',headers:{...sbHeaders(),'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({id:key,valor})});
  }catch(e){ console.warn('Supabase save:',e); }
}
async function cloudLoad(){
  if(!cloudAtivo()) return false;
  try{
    const r=await fetch(SB_URL+'/rest/v1/dados?select=*',{headers:sbHeaders()});
    if(!r.ok) return false;
    const rows=await r.json();
    if(!rows.length) return false;
    rows.forEach(row=>{
      if(row.id==='config'){ if(row.valor) state.config=row.valor; }
      else if(row.id==='notas'){ if(row.valor!==undefined) state.notas=row.valor; }
      else if(row.valor!==null&&row.valor!==undefined) state[row.id]=row.valor;
    });
    migrarDados();
    ['clientes','agendamentos','lancamentos','produtos','lembretesEnviados','notifAlteracao','pacotes'].forEach(k=>LS.set(PFX+''+k,state[k]));
    LS.set(PFX+'config',state.config);
    LS.set(PFX+'notas',state.notas);
    return true;
  }catch(e){ console.warn('Supabase load:',e); return false; }
}

/* ============ HELPERS ============ */
const uid = () => Math.random().toString(36).slice(2,10);
const fmtMoney = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fmtDate = d => { if(!d) return ''; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; };
const todayStr = () => new Date().toISOString().split('T')[0];
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const calcLiquido = (v,fp) => fp==='debito'?v*(1-state.config.taxaDebito/100):fp==='credito'?v*(1-state.config.taxaCredito/100):v;
const fmtPayment = fp => ({pix:'Pix',dinheiro:'Dinheiro',debito:`Débito (−${state.config.taxaDebito}%)`,credito:`Crédito (−${state.config.taxaCredito}%)`}[fp]||fp);

/* Telefone -> formato wa.me (só dígitos, com 55) */
function limparTelefone(tel){
  let d = String(tel||'').replace(/\D/g,'');
  if(d.length===10 || d.length===11) d = '55'+d;
  return d;
}
/* Substitui variáveis do template pelos dados do agendamento */
function montarMensagem(tpl, a){
  return (tpl||'')
    .replace(/\{nome\}/g, a.clienteNome||'')
    .replace(/\{hora\}/g, a.hora||'')
    .replace(/\{data\}/g, fmtDate(a.data)||'')
    .replace(/\{servico\}/g, a.servico||'')
    .replace(/\{barbeiro\}/g, a.barbeiro||'');
}
function abrirWhatsApp(tel, msg){
  const num = limparTelefone(tel);
  if(!num){ alert('Cliente sem telefone cadastrado.'); return; }
  window.open('https://wa.me/'+num+'?text='+encodeURIComponent(msg), '_blank');
}
/* Preço de um serviço pelo nome */
function servicoPreco(nome){
  const s = (state.config.servicos||[]).find(x=>x && x.nome===nome);
  return s ? (s.preco||0) : 0;
}
function servicoDuracao(nome){
  const s = (state.config.servicos||[]).find(x=>x && x.nome===nome);
  return s ? (s.duracao||0) : 0;
}
/* Datas (formato local YYYY-MM-DD) */
function parseLocalDate(s){ const [y,m,d]=String(s).split('-').map(Number); return new Date(y,m-1,d); }
function toISO(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function weekDays(refISO){
  const d=parseLocalDate(refISO); const dow=(d.getDay()+6)%7; // 0=segunda
  const seg=new Date(d); seg.setDate(d.getDate()-dow);
  const arr=[]; for(let i=0;i<7;i++){ const x=new Date(seg); x.setDate(seg.getDate()+i); arr.push(toISO(x)); }
  return arr;
}
function countAgDia(iso){ return state.agendamentos.filter(a=>a.data===iso && a.status!=='cancelado').length; }

  return `<div class="card" style="padding:14px;margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button class="btn btn-sm" onclick="agFiltro='${prev}';render()">‹ Semana</button>
      <span style="font-size:12px;color:var(--text-2);font-weight:600">${parseLocalDate(dias[0]).toLocaleDateString('pt-BR',{day:'numeric',month:'short'})} – ${parseLocalDate(dias[6]).toLocaleDateString('pt-BR',{day:'numeric',month:'short'})}</span>
      <button class="btn btn-sm" onclick="agFiltro='${next}';render()">Semana ›</button>

          <span style="font-size:9px;color:var(--text-3);font-weight:700">${nomes[i]}</span>
          <span style="font-size:15px;font-weight:700;color:${sel?'var(--gold)':'var(--text)'}">${dnum}</span>
          <span style="font-size:9px;font-weight:700;color:${n>0?'var(--gold)':'var(--text-3)'}">${n>0?n:'—'}</span>
        </button>`; }).join('')}
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-top:10px;font-size:10px;color:var(--text-3)">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:11px;height:11px;border-radius:3px;background:rgba(201,168,76,0.15)"></span>tranquilo</span>

let _pinAtual='', _pinErro='';
async function hashPin(p){ const d=new TextEncoder().encode(p+':naregua:'+lojaId); const h=await crypto.subtle.digest('SHA-256',d); return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join(''); }
function sessionValida(){ const s=LS.get(PFX+'session'); return !!(s&&s.pinHash&&s.expires&&Date.now()<s.expires&&s.pinHash===state.config.pinHash); }
function pinRequired(){ return !!(state.config.pinHash)&&!sessionValida(); }
function lockApp(){ LS.set(PFX+'session',null); _pinAtual=''; _pinErro=''; render(); }
function viewPin(){
  return `<div style="text-align:center;width:100%;max-width:320px">
    <div class="side-logo" style="margin:0 auto 16px;width:60px;height:60px">${iconeMarca(24,'#0A0A0A')}</div>
    <h1 style="font-size:20px;font-weight:700;margin-bottom:4px">${esc(state.config.barbearia?.nome||'Barbearia')}</h1>
    <p style="font-size:13px;color:var(--text-3);margin-bottom:28px">Digite seu PIN para entrar</p>
    <div style="display:flex;gap:16px;justify-content:center;margin-bottom:${_pinErro?'14px':'28px'}">
      ${[0,1,2,3].map(i=>`<div class="pin-dot ${_pinAtual.length>i?'filled':''}" id="pd-${i}"></div>`).join('')}
    </div>
    ${_pinErro?`<p style="color:var(--red);font-size:13px;margin-bottom:20px">${_pinErro}</p>`:''}
    <div style="display:grid;grid-template-columns:repeat(3,74px);gap:12px;justify-content:center">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="kp-btn" onclick="pinDigito('${n}')">${n}</button>`).join('')}
      <div class="kp-empty"></div>
      <button class="kp-btn" onclick="pinDigito('0')">0</button>
      <button class="kp-btn" style="font-size:18px" onclick="pinApagar()">⌫</button>
    </div>
  </div>`;
}
function pinDigito(d){
  if(_pinAtual.length>=4) return;
  _pinAtual+=d; _pinErro='';
  for(let i=0;i<4;i++){const el=document.getElementById('pd-'+i);if(el){el.classList.toggle('filled',_pinAtual.length>i);el.classList.remove('erro');}}
  if(_pinAtual.length===4) setTimeout(pinVerificar,150);
}
function pinApagar(){ if(_pinAtual.length>0){_pinAtual=_pinAtual.slice(0,-1);for(let i=0;i<4;i++){const el=document.getElementById('pd-'+i);if(el)el.classList.toggle('filled',_pinAtual.length>i);}}}
async function pinVerificar(){
  const h=await hashPin(_pinAtual);
  if(h===state.config.pinHash){
    LS.set(PFX+'session',{pinHash:state.config.pinHash,expires:Date.now()+30*24*60*60*1000});
    _pinAtual='';_pinErro='';
    const ov=document.getElementById('pin-overlay'); if(ov) ov.style.display='none';
    render();
  } else {
    _pinErro='PIN incorreto. Tente novamente.';_pinAtual='';
    for(let i=0;i<4;i++){const el=document.getElementById('pd-'+i);if(el){el.classList.remove('filled');el.classList.add('erro');}}
    setTimeout(()=>{for(let i=0;i<4;i++){const el=document.getElementById('pd-'+i);if(el)el.classList.remove('erro');}},800);
  }
}
function modalSetupPin(){
  const temPin=!!state.config.pinHash;
  openModal(`
    <div class="modal-head"><h2>${temPin?'Alterar':'Configurar'} PIN</h2><button onclick="closeModal()">${ICON.x(20)}</button></div>
    <p style="font-size:13px;color:var(--text-2);margin-bottom:16px">PIN de 4 dígitos. Cada dispositivo fica logado por <strong>30 dias</strong>.</p>
    ${temPin?`<div class="field"><label class="lbl">PIN atual</label><input id="pin-old" type="tel" maxlength="4" inputmode="numeric" pattern="[0-9]*" class="inp" placeholder="PIN atual"></div>`:''}
    <div class="field"><label class="lbl">Novo PIN</label><input id="pin-new" type="tel" maxlength="4" inputmode="numeric" pattern="[0-9]*" class="inp" placeholder="4 dígitos"></div>
    <div class="field"><label class="lbl">Confirmar PIN</label><input id="pin-conf" type="tel" maxlength="4" inputmode="numeric" pattern="[0-9]*" class="inp" placeholder="Repita"></div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarPin()">Salvar PIN</button></div>
  `);
}
async function salvarPin(){
  const temPin=!!state.config.pinHash;
  const novo=document.getElementById('pin-new').value.trim();
  const conf=document.getElementById('pin-conf').value.trim();
  if(!/^\d{4}$/.test(novo)){alert('PIN deve ter exatamente 4 dígitos.');return;}
  if(novo!==conf){alert('Os PINs não coincidem.');return;}
  if(temPin){const h=await hashPin(document.getElementById('pin-old').value.trim());if(h!==state.config.pinHash){alert('PIN atual incorreto.');return;}}
  state.config.pinHash=await hashPin(novo);
  saveConfig();
  LS.set(PFX+'session',{pinHash:state.config.pinHash,expires:Date.now()+30*24*60*60*1000});
  closeModal();render();
  alert('✅ PIN configurado! Este dispositivo fica logado por 30 dias.');
}
async function removerPin(){
  if(!state.config.pinHash) return;
  const pin=prompt('Digite o PIN atual para confirmar remoção:'); if(!pin) return;
  const h=await hashPin(pin);
  if(h!==state.config.pinHash){alert('PIN incorreto.');return;}
  if(!confirm('Remover PIN? O sistema ficará público para quem tiver o link.')) return;
  state.config.pinHash='';saveConfig();LS.set(PFX+'session',null);render();
}

/* ============ STATUS ============ */
const ST_COLOR={agendado:'var(--gold)',concluido:'var(--green)',cancelado:'var(--red)'};
const ST_BG={agendado:'rgba(201,168,76,.1)',concluido:'var(--green-bg)',cancelado:'var(--red-bg)'};
const ST_LBL={agendado:'Agendado',concluido:'Concluído',cancelado:'Cancelado'};

/* ============ RENDER ROUTER ============ */
function render(){
  try{
    const overlay=document.getElementById('pin-overlay');
    if(pinRequired()){
      if(overlay){ overlay.style.display='flex'; overlay.innerHTML=viewPin(); }
      return;
    }
    if(overlay) overlay.style.display='none';
    renderNav();
    const el=document.getElementById('view');
    if(!el) return;
    if(isFuncionario() && !['agenda','dashboard','lembretes','clientes'].includes(state.view)){
      state.view = 'agenda';
    }
    el.innerHTML=({
      dashboard:viewDashboard, agenda:viewAgenda, lembretes:viewLembretes, clientes:viewClientes,
      financeiro:viewFinanceiro, produtos:viewProdutos, barbeiros:viewBarbeiros,
      pacotes:viewPacotes, configuracoes:viewConfig,
    }[state.view]||viewAgenda)();
    atualizarBadgeLembretes();
  }catch(e){
    console.error('render error:',e);
    const el=document.getElementById('view');
    if(el) el.innerHTML=`<div style="padding:24px;color:var(--red);text-align:center"><p style="font-size:14px;font-weight:600">Erro ao carregar a tela</p><p style="font-size:12px;margin-top:8px;color:var(--text-3)">${e.message}</p><button class="btn btn-primary" style="margin-top:16px" onclick="location.reload()">Recarregar</button></div>`;
  }
}
function atualizarBadgeLembretes(){
  const b=document.getElementById('lembrete-badge'); if(!b) return;
  const n=lembretesPendentes().length + (state.notifAlteracao||[]).filter(x=>!x.enviado).length;
  if(n>0){ b.textContent=n>9?'9+':n; b.style.display='flex'; } else { b.style.display='none'; }
}

  const despesas=lHoje.filter(l=>l.tipo==='saida').reduce((s,l)=>s+l.valor,0);

      <p style="color:var(--text-2);font-size:12px">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
    </div>
    ${baixo.length?`<div style="padding:10px 14px;background:var(--amber-bg);border:1px solid #F59E0B40;border-radius:8px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--amber)">${ICON.warning(15,'#F59E0B')}<span><strong>${baixo.length} produto(s) com estoque baixo:</strong> ${baixo.map(p=>esc(p.nome)).join(', ')}</span></div>`:''}
    ${(()=>{ const pend=lembretesPendentes(); const notifs=(state.notifAlteracao||[]).filter(x=>!x.enviado); const total=pend.length+notifs.length; return total?`<div onclick="setView('lembretes')" style="cursor:pointer;padding:10px 14px;background:var(--green-bg);border:1px solid #22C55E40;border-radius:8px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--green)">${ICON.clock(15,'#22C55E')}<span><strong>${total} lembrete(s) para enviar</strong> — toque para abrir</span></div>`:''; })()}
    ${inativos.length?`<div onclick="setView('clientes')" style="cursor:pointer;padding:10px 14px;background:var(--blue-bg);border:1px solid #60A5FA40;border-radius:8px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--blue)">${ICON.users(15,'#60A5FA')}<span><strong>${inativos.length} cliente(s) sem aparecer há +30 dias</strong> — toque para ver</span></div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      ${stats.map(s=>`<div class="card" style="display:flex;align-items:center;gap:12px;padding:14px">

let agFiltro = todayStr();
let agModo='novo';
let agFiltroBarb='', agFiltroStatus='', agSubModo='lista', agTimelineBarb='';
function viewAgenda(){
  if(agSubModo==='timeline') return viewAgendaTimeline();
  let lista=state.agendamentos.filter(a=>!agFiltro||a.data===agFiltro);
  if(agFiltroBarb) lista=lista.filter(a=>a.barbeiro===agFiltroBarb);
  if(agFiltroStatus) lista=lista.filter(a=>a.status===agFiltroStatus);
  lista.sort((a,b)=>a.hora>b.hora?1:-1);
  const barbs=[...new Set(state.agendamentos.map(a=>a.barbeiro).filter(Boolean))];
  const filtroDesc = [agFiltroBarb?`barbeiro: ${agFiltroBarb}`:'', agFiltroStatus?`status: ${ST_LBL[agFiltroStatus]||agFiltroStatus}`:''  ].filter(Boolean).join(' · ');
  // funcionário com barbeiro vinculado não pode trocar o filtro
  const barbLocked = isFuncionario() && !!currentBarbeiro;

/* ============ CORES DE SERVIÇOS (Melhoria 12) ============ */
const SERVICO_PALETA=['#C9A84C','#60A5FA','#34D399','#F87171','#A78BFA','#FB923C','#38BDF8','#4ADE80','#E879F9','#FACC15'];
function servicoCor(nome){
  const idx=(state.config.servicos||[]).findIndex(s=>(s.nome||s)===nome);
  if(idx>=0) return SERVICO_PALETA[idx % SERVICO_PALETA.length];
  let h=0; for(let i=0;i<(nome||'').length;i++){h=(h*31+nome.charCodeAt(i))>>>0;} return SERVICO_PALETA[h % SERVICO_PALETA.length];
}

function saveAgenda(id){
  const g=x=>document.getElementById(x).value;
  const data={clienteNome:g('m-nome').trim(),clienteTelefone:g('m-tel').trim(),servico:g('m-serv'),barbeiro:g('m-barb'),data:g('m-data'),hora:g('m-hora'),status:g('m-status'),obs:g('m-obs').trim()};
  if(!data.clienteNome||!data.servico||!data.data||!data.hora){ alert('Preencha nome, serviço, data e hora.'); return; }
  // Sem bloqueio por horário passado — permite agendar qualquer data/hora livremente
  // detecta serviço de pacote
  let pacoteRef={};
  if(data.servico.startsWith('PACOTE:')){
    const pts=data.servico.split(':');
    const pk=state.pacotes.find(x=>x.id===pts[1]);
    const si=parseInt(pts[2]);
    if(pk&&pk.servicos[si]){
      data.servico=pk.servicos[si].servico;
      pacoteRef={ePacote:true,pacoteId:pts[1],pacoteServIdx:si};
    }
  }
  // cadastra automaticamente o cliente se ainda não existir
  const telNorm=data.clienteTelefone.replace(/\D/g,'');
  const jaExiste=state.clientes.some(c=>c.nome.trim().toLowerCase()===data.clienteNome.toLowerCase()||(telNorm&&(c.telefone||'').replace(/\D/g,'')===telNorm));
  if(!jaExiste){
    state.clientes.push({id:uid(),nome:data.clienteNome,telefone:data.clienteTelefone,dataNascimento:'',observacoes:'',bloqueado:false,createdAt:Date.now()});
    save('clientes');
  }
  // detecta alteração de horário (notificação para o cliente)
  if(id){
    const ag=state.agendamentos.find(a=>a.id===id);
    if(ag&&(ag.data!==data.data||ag.hora!==data.hora)){
      state.notifAlteracao.push({id:uid(),agId:id,clienteNome:data.clienteNome,clienteTelefone:data.clienteTelefone,servico:data.servico,dataAnterior:ag.data,horaAnterior:ag.hora,novaData:data.data,novaHora:data.hora,createdAt:Date.now(),enviado:false});
      save('notifAlteracao');
    }
    state.agendamentos=state.agendamentos.map(a=>a.id===id?{...a,...data,...pacoteRef}:a);
  } else {
    state.agendamentos.push({...data,...pacoteRef,id:uid(),createdAt:Date.now(),confirmacaoEnviada:false});
  }
  save('agendamentos'); closeModal(); render();
}

/* ============ LEMBRETES (WhatsApp em 1 toque) ============ */
function lembretesPendentes(){
  const agora=new Date();
  const ativos=(state.config.lembretes||[]).filter(l=>l.ativo);
  const pend=[];
  state.agendamentos.filter(a=>a.status==='agendado').forEach(a=>{
    const dt=new Date(a.data+'T'+(a.hora||'00:00'));
    if(isNaN(dt)||dt<agora) return;
    ativos.forEach(l=>{
      const inicio=new Date(dt.getTime()-l.horasAntes*3600000);
      const key=a.id+'_'+l.id;
      // só mostra se, quando o agendamento foi criado, ainda faltava esse tempo (ex: 24h)
      if(agora>=inicio && (a.createdAt||0)<=inicio.getTime() && !state.lembretesEnviados.includes(key)) pend.push({ag:a,lembrete:l,key});
    });
  });
  pend.sort((x,y)=>`${x.ag.data}${x.ag.hora}`>`${y.ag.data}${y.ag.hora}`?1:-1);
  return pend;
}
function lembretesProximos(){
  const agora=new Date();
  const ativos=(state.config.lembretes||[]).filter(l=>l.ativo);
  const prox=[];
  state.agendamentos.filter(a=>a.status==='agendado').forEach(a=>{
    const dt=new Date(a.data+'T'+(a.hora||'00:00'));
    if(isNaN(dt)||dt<agora) return;
    ativos.forEach(l=>{
      const inicio=new Date(dt.getTime()-l.horasAntes*3600000);
      const key=a.id+'_'+l.id;
      // ainda NÃO chegou a hora, mas faz sentido (criado com antecedência) e não foi enviado
      if(agora<inicio && (a.createdAt||0)<=inicio.getTime() && !state.lembretesEnviados.includes(key)) prox.push({ag:a,lembrete:l,key,inicio});
    });
  });
  prox.sort((x,y)=>x.inicio-y.inicio);
  return prox;
}
function montarMsgAlteracao(n){
  return (state.config.msgAlteracao||'')

    .replace(/\{servico\}/g, n.servico||'')

    .replace(/\{horaAnterior\}/g, n.horaAnterior||'');
}

    openModal(`
      <div class="modal-head"><h2>Concluir Atendimento</h2><button onclick="closeModal()">${ICON.x(20)}</button></div>
      <div style="padding:12px;background:var(--amber-bg);border:1px solid rgba(245,158,11,.25);border-radius:8px;margin-bottom:14px">
        <div style="font-size:13px;font-weight:600;color:var(--amber);margin-bottom:4px">📦 Atendimento de Pacote</div>
        <div style="font-size:12px;color:var(--text-2)">Pacote: <strong>${esc(pk?.nome||'Pacote')}</strong> · Cliente: <strong>${esc(a.clienteNome)}</strong></div>
        <div style="font-size:12px;color:var(--text-2);margin-top:3px">Serviço: <strong>${esc(a.servico)}</strong> · Restantes após este: <strong>${Math.max(0,rest-1)}</strong></div>

      </div>

    `);
    return;
  }
  // Fluxo normal (serviço avulso)
  concluirTmp={formaPagamento:'pix'};
  concluirProdutos=[];
  const preco=servicoPreco(a.servico);
  const precoVigente=preco; // captura preço atual do serviço no momento do atendimento
  openModal(`
    <div class="modal-head"><h2>Concluir Atendimento</h2><button onclick="closeModal()">${ICON.x(20)}</button></div>
    <div style="font-size:13px;color:var(--text-2);margin-bottom:14px">${esc(a.clienteNome)} · ${esc(a.servico)}</div>
    <div class="field"><label class="lbl">Valor do serviço (R$)</label><input id="cc-valor" type="number" step="0.01" min="0" class="inp" value="${preco}" oninput="updConcluir()"></div>
    <div class="field"><label class="lbl">Produtos vendidos (opcional)</label>
      <select id="cc-prod-sel" class="inp" onchange="addProdutoConcluir()"><option value="">Selecione um produto para adicionar...</option>${state.produtos.slice().sort((x,y)=>x.nome.localeCompare(y.nome)).map(p=>`<option value="${p.id}">${esc(p.nome)} · ${fmtMoney(p.preco)}</option>`).join('')}</select>
      <div id="cc-prod-list" style="margin-top:8px"></div>
    </div>
    <div class="field"><label class="lbl">Desconto</label><div style="display:flex;gap:6px"><input id="cc-desc" type="number" step="0.01" min="0" class="inp" value="0" oninput="updConcluir()" style="flex:1"><select id="cc-tipo" class="inp" style="width:64px" onchange="updConcluir()"><option value="reais">R$</option><option value="pct">%</option></select></div></div>
    <div class="field"><label class="lbl">Forma de Pagamento</label><div class="pay-grid" id="cc-pay">
      ${[['pix','Pix'],['dinheiro','Dinheiro'],['debito',`Débito (−${state.config.taxaDebito}%)`],['credito',`Crédito (−${state.config.taxaCredito}%)`]].map(([v,l])=>`<button class="pay ${v==='pix'?'on':''}" data-p="${v}" onclick="setConcluirPay('${v}')">${l}</button>`).join('')}
    </div></div>
    <div class="field"><label class="lbl">Gorjeta para o ${vocabProf().toLowerCase()} (opcional)</label>
      <div style="display:flex;gap:7px;margin-bottom:6px">
        ${[5,10,15,20].map(v=>`<button class="pay" data-tip="${v}" onclick="setConcluirTip(${v})" style="flex:1;font-size:12px;font-weight:700">R$\u00a0${v}</button>`).join('')}
        <button class="pay" data-tip="0" onclick="setConcluirTip(0)" style="font-size:12px">✕</button>
      </div>
      <input id="cc-gorjeta" type="number" step="0.50" min="0" class="inp" placeholder="Ou digite o valor (R$)" oninput="updConcluir()" style="margin-top:0">
    </div>
    <div id="cc-resumo" style="padding:10px 12px;background:var(--green-bg);border-radius:7px;font-size:13px;color:var(--green);margin-bottom:8px"></div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="confirmarConcluir('${id}')">Confirmar e lançar</button></div>
  `);
  renderProdutosConcluir(); updConcluir();
}
function setConcluirPay(p){ concluirTmp.formaPagamento=p; document.querySelectorAll('#cc-pay .pay').forEach(b=>b.classList.toggle('on',b.dataset.p===p)); updConcluir(); }
function setConcluirTip(v){
  const inp=document.getElementById('cc-gorjeta'); if(inp) inp.value=v||'';
  document.querySelectorAll('[data-tip]').forEach(b=>b.classList.toggle('on',parseFloat(b.dataset.tip)===v&&v>0));
  updConcluir();
}
function gorjetaVal(){ return parseFloat(document.getElementById('cc-gorjeta')?.value)||0; }
function addProdutoConcluir(){
  const sel=document.getElementById('cc-prod-sel'); const p=state.produtos.find(x=>x.id===sel.value);
  if(!p) return;
  concluirProdutos.push({id:p.id,nome:p.nome,preco:Number(p.preco)||0,custo:Number(p.custo)||0});
  sel.value=''; renderProdutosConcluir(); updConcluir();
}
function removeProdutoConcluir(i){ concluirProdutos.splice(i,1); renderProdutosConcluir(); updConcluir(); }
function renderProdutosConcluir(){
  const box=document.getElementById('cc-prod-list'); if(!box) return;
  box.innerHTML = concluirProdutos.map((p,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--inner);border:1px solid var(--border);border-radius:7px;margin-bottom:6px;font-size:12px">
    <span>${esc(p.nome)}</span><span style="display:flex;align-items:center;gap:10px"><span style="color:var(--gold)">${fmtMoney(p.preco)}</span><button onclick="removeProdutoConcluir(${i})" style="background:none;border:none;color:var(--red);font-size:15px;cursor:pointer">×</button></span>
  </div>`).join('');
}
function valorFinal(valId,descId,tipoId){
  const v=parseFloat(document.getElementById(valId).value)||0;
  const d=parseFloat(document.getElementById(descId).value)||0;
  const tipo=document.getElementById(tipoId).value;
  let f=tipo==='pct'?v*(1-d/100):v-d;
  return f<0?0:f;
}
function somaProdutosConcluir(){ return concluirProdutos.reduce((s,p)=>s+(Number(p.preco)||0),0); }
function concluirFinal(){
  const serv=parseFloat(document.getElementById('cc-valor').value)||0;
  const base=serv+somaProdutosConcluir();
  const d=parseFloat(document.getElementById('cc-desc').value)||0;
  const tipo=document.getElementById('cc-tipo').value;
  let f=tipo==='pct'?base*(1-d/100):base-d;
  return f<0?0:f;
}
function updConcluir(){
  const serv=parseFloat(document.getElementById('cc-valor').value)||0;
  const prod=somaProdutosConcluir();
  const f=concluirFinal();
  const liq=calcLiquido(f,concluirTmp.formaPagamento);
  const tip=gorjetaVal();
  const box=document.getElementById('cc-resumo');
  if(box) box.innerHTML = (prod>0?`Serviço ${fmtMoney(serv)} + Produtos ${fmtMoney(prod)}<br>`:'')+`Valor final: <strong>${fmtMoney(f)}</strong>`+(Math.abs(liq-f)>0.001?` · Líquido após taxa: <strong>${fmtMoney(liq)}</strong>`:''  )+(tip>0?`<br><span style="color:var(--gold)">✨ Gorjeta: <strong>${fmtMoney(tip)}</strong> → 100% para o ${vocabProf().toLowerCase()}</span>`:'');
}
function confirmarConcluir(id){
  const a=state.agendamentos.find(x=>x.id===id); if(!a) return;
  const f=concluirFinal();
  const liq=calcLiquido(f,concluirTmp.formaPagamento);
  const tip=gorjetaVal();
  if(a.lancamentoId) state.lancamentos=state.lancamentos.filter(l=>l.id!==a.lancamentoId); // evita duplicar
  const lancId=uid();
  const nomesProd=concluirProdutos.map(p=>p.nome);
  const desc=`${a.servico} — ${a.clienteNome}`+(nomesProd.length?` (+ ${nomesProd.join(', ')})`:'');
  state.lancamentos.push({id:lancId,tipo:'entrada',descricao:desc,categoria:'Serviço',valor:f,valorLiquido:liq,formaPagamento:concluirTmp.formaPagamento,data:todayStr(),dataAgendamento:a.data,createdAt:Date.now(),origem:'agendamento',produtosComanda:concluirProdutos.map(p=>({id:p.id,nome:p.nome,preco:p.preco,custo:p.custo||0})),precoVigente:servicoPreco(a.servico)});
  // Gorjeta: lançamento separado, 100% para o barbeiro (não entra no cálculo de comissão percentual — é lançada como entrada direta)
  if(tip>0){
    state.lancamentos.push({
      id:uid(),tipo:'entrada',
      descricao:`✨ Gorjeta — ${a.clienteNome} (${a.barbeiro||'Barbeiro'})`,
      categoria:'Gorjeta',
      valor:tip,valorLiquido:tip,
      formaPagamento:concluirTmp.formaPagamento,
      barbeiro:a.barbeiro||'',
      data:todayStr(),dataAgendamento:a.data,
      createdAt:Date.now(),origem:'gorjeta'
    });
  }
  if(concluirProdutos.length){
    concluirProdutos.forEach(cp=>{ const prod=state.produtos.find(x=>x.id===cp.id); if(prod && prod.estoque!==''&&prod.estoque!=null) prod.estoque=Math.max(0,parseInt(prod.estoque)-1); });
    save('produtos');
  }
  state.agendamentos=state.agendamentos.map(x=>x.id===id?{...x,status:'concluido',lancamentoId:lancId}:x);
  save('lancamentos'); save('agendamentos'); closeModal(); render();
  // Se Modo Operação está ativo: garante overlay visível e atualiza para o próximo cliente
  if(_modoOpAtivo){
    const ov=document.getElementById('modo-op-overlay');
    if(ov) ov.style.display='flex';
    setTimeout(renderModoOp, 100);
  }
}

function updVender(){

function confirmarVender(id){
  const p=state.produtos.find(x=>x.id===id); if(!p) return;
  const f=valorFinal('vd-valor','vd-desc','vd-tipo');
  const liq=calcLiquido(f,venderTmp.formaPagamento);
  state.lancamentos.push({id:uid(),tipo:'entrada',descricao:`Produto: ${p.nome}`,categoria:'Produto',valor:f,valorLiquido:liq,formaPagamento:venderTmp.formaPagamento,data:todayStr(),createdAt:Date.now(),origem:'produto'});
  if(p.estoque!==''&&p.estoque!=null){ const novo=Math.max(0,parseInt(p.estoque)-1); state.produtos=state.produtos.map(x=>x.id===id?{...x,estoque:novo}:x); }
  save('lancamentos'); save('produtos'); closeModal(); render();
}

let barbFiltro=todayStr(), barbModo='periodo', barbFiltroInicio=todayStr().slice(0,8)+'01', barbFiltroFim=todayStr();
function barbNavDate(dir){ return barbFiltro; }
function barbPeriodoLabel(){
  if(barbModo==='periodo') return `${fmtDate(barbFiltroInicio)} – ${fmtDate(barbFiltroFim)}`;
  if(barbModo==='dia') return fmtDate(barbFiltro);
  if(barbModo==='semana'){ const w=weekDays(barbFiltro); return `${fmtDate(w[0])} – ${fmtDate(w[6])}`; }
  return new Date(barbFiltro+'-01T12:00:00').toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
}

  const barbs=state.config.barbeiros||[];
  const com=state.config.comissoes||{};

      ${barbModo==='dia'?`<input type="date" class="inp" style="max-width:140px" value="${barbFiltro}" onchange="barbFiltro=this.value;render()">`:barbModo==='mes'?`<input type="month" class="inp" style="max-width:140px" value="${barbFiltro.slice(0,7)}" onchange="barbFiltro=this.value+'-01';render()">`:``}

}function gerarRelatorioBarbeiro(b){

 const dias = barbModo==='semana'?weekDays(barbFiltro):[];

    const lanc=a.lancamentoId?state.lancamentos.find(l=>l.id===a.lancamentoId):null;

let pacoteServicosTemp=[];
function pacotesAtivosCliente(nomeCliente){
  return state.pacotes.filter(p=>p.ativo!==false&&p.clienteNome===nomeCliente&&p.servicos.some(s=>(s.usados||0)<s.quantidade));
}
function enviarMsgPacote(pid){
  const p=state.pacotes.find(x=>x.id===pid); if(!p) return;
  const c=state.clientes.find(x=>x.nome===p.clienteNome);
  if(!c?.telefone){alert('Este cliente não tem telefone cadastrado.');return;}
  const msg=(state.config.msgPacoteRenovado||'')
    .replace(/\{nome\}/g,p.clienteNome)
    .replace(/\{pacote\}/g,p.nome||'Pacote')
    .replace(/\{mes\}/g,new Date((p.mes||todayStr().slice(0,7))+'-01T12:00:00').toLocaleDateString('pt-BR',{month:'long',year:'numeric'}))
    .replace(/\{valor\}/g,fmtMoney(p.valorTotal||0));
  abrirWhatsApp(c.telefone,msg);
}
function concluirPacote(id){
  const a=state.agendamentos.find(x=>x.id===id); if(!a) return;
  if(a.pacoteId!==undefined&&a.pacoteServIdx!==undefined){
    const pac=state.pacotes.find(p=>p.id===a.pacoteId);
    const si=a.pacoteServIdx;
    const eraZero = pac && (pac.servicos[si]?.usados||0)===0;
    state.pacotes=state.pacotes.map(p=>p.id===a.pacoteId?{...p,servicos:p.servicos.map((s,i)=>i===si?{...s,usados:(s.usados||0)+1}:s)}:p);
    save('pacotes');
    // lançamento financeiro
    const nomePac = pac?.nome||'Pacote';
    const valorPac = pac?.valorTotal||0;
    if(eraZero && valorPac>0){
      // 1º serviço do ciclo: lança entrada com valor
      state.lancamentos.push({
        id:uid(),tipo:'entrada',
        descricao:`Pacote: ${nomePac} — ${a.clienteNome} (1º atendimento do mês)`,
        categoria:'Serviço',
        valor:valorPac,valorLiquido:valorPac,
        formaPagamento:'pix',
        data:todayStr(),dataAgendamento:a.data,createdAt:Date.now(),origem:'pacote'
      });
    } else {
      // demais serviços: lança informativo com valor 0
      state.lancamentos.push({
        id:uid(),tipo:'entrada',
        descricao:`📦 Pacote: ${nomePac} — ${a.clienteNome} — ${a.servico} (incluso no pacote)`,
        categoria:'Serviço',
        valor:0,valorLiquido:0,
        formaPagamento:'pix',
        data:todayStr(),dataAgendamento:a.data,createdAt:Date.now(),origem:'pacote_informativo'
      });
    }
    save('lancamentos');
  }
  state.agendamentos=state.agendamentos.map(x=>x.id===id?{...x,status:'concluido'}:x);
  save('agendamentos'); closeModal(); render();
  if(_modoOpAtivo){ const ov=document.getElementById('modo-op-overlay'); if(ov) ov.style.display='flex'; setTimeout(renderModoOp,100); }
}
function pagarComissao(barbeiro, valor){
  if(!confirm(`Confirmar pagamento de comissão de ${fmtMoney(valor)} para ${barbeiro}?\n\nIsso lançará uma SAÍDA no financeiro e zerará a contagem.`)) return;
  const periodo = barbPeriodoLabel();
  state.lancamentos.push({
    id:uid(),
    tipo:'saida',
    descricao:`Comissão ${barbeiro} — ${periodo}`,
    categoria:'Salário',
    valor:valor,
    formaPagamento:'dinheiro',
    data:todayStr(),
    createdAt:Date.now(),
    origem:'comissao'
  });
  // salva o timestamp do pagamento para zerar o ciclo
  if(!state.config.comissoesPagas) state.config.comissoesPagas={};
  state.config.comissoesPagas[barbeiro] = Date.now();
  save('lancamentos');
  saveConfig();
  render();
  alert(`✅ Comissão de ${fmtMoney(valor)} paga para ${barbeiro}!\nContagem zerada.`);
}

function usarServicoPacote(pid,si){

let finFiltro=todayStr(), finModo='mes';

const CATS=['Serviço','Produto','Aluguel','Material','Salário','Outros'];
function finLista(){
  const dias=weekDays(finFiltro);
  const filtros={dia:l=>l.data===finFiltro,semana:l=>dias.includes(l.data),mes:l=>(l.data||'').startsWith(finFiltro.slice(0,7)),ano:l=>(l.data||'').startsWith(finFiltro.slice(0,4)),tudo:()=>true};
  return state.lancamentos.filter(filtros[finModo]||filtros.tudo).sort((a,b)=>b.createdAt-a.createdAt);
}
function periodoLabel(){
  const d=finFiltro, mes=d.slice(0,7), ano=d.slice(0,4);
  const labels={
    dia:fmtDate(d),
    semana:`${fmtDate(weekDays(d)[0])} – ${fmtDate(weekDays(d)[6])}`,
    mes:new Date(d+'T12:00').toLocaleDateString('pt-BR',{month:'long',year:'numeric'}),
    ano,tudo:'Todo o período'
  };
  return labels[finModo]||'';
}

    else if(finModo==='mes'){D.setMonth(D.getMonth()+dir);}

      showNav?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">

        <button class="btn btn-sm" onclick="finFiltro='${navDate(1)}';render()">›</button>
      </div>`:`<div style="margin-bottom:14px;font-size:13px;font-weight:600;color:var(--gold)">${periodoLabel()}</div>`}
    <div class="row3" style="margin-bottom:16px">

      <div style="display:flex;flex-wrap:wrap;gap:8px">${entFP.map(x=>`<div style="flex:1;min-width:90px;background:${FP_COLOR[x.fp]}18;border:1px solid ${FP_COLOR[x.fp]}30;border-radius:8px;padding:8px 10px;text-align:center">

      </div>`).join('')}</div></div>`:''}
    ${lista.length?lista.map(l=>{
      const isInfoPacote = l.origem==='pacote_informativo';
      const taxa=(!isInfoPacote&&l.tipo==='entrada'&&(l.formaPagamento==='debito'||l.formaPagamento==='credito'))?l.valor-(l.valorLiquido??l.valor):0;
      const bordaCor = isInfoPacote?'var(--blue)':l.tipo==='entrada'?'var(--green)':'var(--red)';

    ${finModo!=='tudo'?`<div style="margin-top:16px;padding:12px 14px;background:var(--inner);border-radius:8px;border:1px solid var(--border);font-size:12px;color:var(--text-3);text-align:center">

function setSaidaCat(c){

}
function setLancTipo(t){
  lancTmp.tipo=t;
  document.querySelectorAll('#l-toggle .toggle').forEach(b=>{
    const on=b.dataset.t===t; b.className='toggle'+(on?(t==='entrada'?' on-green':' on-red'):'');
    b.querySelector('svg')?.setAttribute('stroke', on?(t==='entrada'?'#22C55E':'#EF4444'):'#6B7280');
  });
  renderCorpoLanc(t);
}
function setLancPay(p){
  lancTmp.formaPagamento=p;
  document.querySelectorAll('#l-pay .pay').forEach(b=>b.classList.toggle('on',b.dataset.p===p));
  updLiquido();
}
function updLiquido(){
  const v=parseFloat(document.getElementById('l-valor').value)||0;
  const box=document.getElementById('l-liquido');
  if(lancTmp.tipo==='entrada'&&v&&(lancTmp.formaPagamento==='debito'||lancTmp.formaPagamento==='credito')){
    box.innerHTML=`<div style="padding:8px 12px;background:var(--amber-bg);border-radius:6px;font-size:12px;color:var(--amber)">💡 Valor líquido: <strong>${fmtMoney(calcLiquido(v,lancTmp.formaPagamento))}</strong></div>`;
  } else box.innerHTML='';
}
function saveLanc(){
  const v=parseFloat(document.getElementById('l-valor').value);
  const desc=document.getElementById('l-desc').value.trim();
  if(!desc||!v){ alert('Informe descrição e valor.'); return; }
  const liquido=lancTmp.tipo==='entrada'?calcLiquido(v,lancTmp.formaPagamento):v;
  state.lancamentos.push({id:uid(),tipo:lancTmp.tipo,descricao:desc,categoria:document.getElementById('l-cat').value,valor:v,valorLiquido:liquido,formaPagamento:lancTmp.formaPagamento,data:document.getElementById('l-data').value,createdAt:Date.now()});
  save('lancamentos'); closeModal(); render();
}

      <div class="field"><label class="lbl">Custo do Produto (R$)</label><input id="p-custo" type="number" step="0.01" min="0" class="inp" value="${p.custo||''}" placeholder="0,00"></div></div>

function lerFoto(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=async ev=>{
    prodFoto=await comprimirFoto(ev.target.result);
    document.getElementById('p-foto-label').innerHTML=`<div style="position:relative"><img src="${prodFoto}" style="width:100%;height:130px;object-fit:cover;border-radius:8px;border:1px solid var(--border)"><div style="position:absolute;bottom:8px;right:8px;padding:3px 8px;background:rgba(0,0,0,.7);border-radius:5px;font-size:11px">Alterar</div></div><input type="file" accept="image/*" style="display:none" onchange="lerFoto(event)">`;
  };
  r.readAsDataURL(f);
}
function saveProduto(id){
  const g=x=>document.getElementById(x).value;
  const nome=g('p-nome').trim(); if(!nome){ alert('Informe o nome.'); return; }
  const data={nome,categoria:g('p-cat'),descricao:g('p-desc').trim(),preco:parseFloat(g('p-preco'))||0,custo:parseFloat(g('p-custo'))||0,validade:g('p-val'),estoque:g('p-est')!==''?parseInt(g('p-est')):'',fotoUrl:prodFoto};
  if(id) state.produtos=state.produtos.map(p=>p.id===id?{...p,...data}:p);
  else state.produtos.push({...data,id:uid(),createdAt:Date.now()});
  save('produtos'); closeModal(); render();
}

function saveDespesaFixa(){
  const nome=document.getElementById('df-nome').value.trim();
  const valor=parseFloat(document.getElementById('df-valor').value)||0;
  const dia=parseInt(document.getElementById('df-dia').value)||1;
  const categoria=document.getElementById('df-cat').value;
  if(!nome||!valor){ alert('Preencha nome e valor.'); return; }
  state.config.despesasFixas.push({id:uid(),nome,valor,dia,categoria});
  saveConfig(); closeModal(); render();
}
function lancarDespesasFixas(){
  const mes=todayStr().slice(0,7);
  const jaLancadas=state.lancamentos.filter(l=>l.despesaFixa&&(l.data||'').startsWith(mes)).map(l=>l.despesaFixa);
  const novas=state.config.despesasFixas.filter(d=>!jaLancadas.includes(d.id));
  if(!novas.length){ alert('Todas as despesas fixas já foram lançadas este mês.'); return; }
  novas.forEach(d=>{
    const dia=String(d.dia).padStart(2,'0');
    state.lancamentos.push({id:uid(),tipo:'saida',descricao:d.nome,valor:d.valor,valorLiquido:d.valor,formaPagamento:'pix',categoria:d.categoria||'despesa',data:`${mes}-${dia}`,despesaFixa:d.id,createdAt:Date.now()});
  });
  save('lancamentos'); render();
  alert(`✅ ${novas.length} despesa(s) lançadas para ${mes}.`);
}

/* ============ RECUPERAÇÃO FIREBASE ============ */
function recuperarDoFirebase(){
  if(!db){ alert('Firebase não está conectado. Verifique sua conexão.'); return; }
  if(!confirm('Isso vai recarregar todos os dados da nuvem Firebase e substituir os dados atuais.\nContinuar?')) return;
  setCloudStatus('🔄 Recarregando da nuvem...','#9CA3AF');
  dadosCol().get().then(snap=>{
    if(snap.empty){ alert('Nenhum dado encontrado no Firebase.\n\nSe as regras expiraram, acesse:\nFirebase Console → Firestore → Regras\ne publique:\nallow read, write: if true;'); setCloudStatus('',''); return; }
    snap.forEach(doc=>{ const d=doc.data(); if(doc.id==='config'){ if(d&&d.value) state.config=d.value; } else if(doc.id==='notas'){ if(d&&d.value!==undefined) state.notas=d.value; } else if(d&&d.items) state[doc.id]=d.items; });
    ['clientes','agendamentos','lancamentos','produtos','lembretesEnviados','notifAlteracao'].forEach(k=>save(k));
    saveConfig(); LS.set(PFX+'notas',state.notas); migrarDados(); render();
    setCloudStatus('✅ Dados recuperados!','#22C55E');
    alert('✅ Dados recuperados com sucesso!\n\nAgora use "Exportar backup" para guardar uma cópia local.');
  }).catch(e=>{ alert('❌ Erro: '+e.message); setCloudStatus('',''); });
}

/* ============ BACKUP ============ */
function exportarBackup(){
  const dados={clientes:state.clientes,agendamentos:state.agendamentos,lancamentos:state.lancamentos,produtos:state.produtos,lembretesEnviados:state.lembretesEnviados,notifAlteracao:state.notifAlteracao,notas:state.notas,config:state.config,exportadoEm:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(dados,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='backup-barbearia-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
}
function importarBackup(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.agendamentos) state.agendamentos=d.agendamentos;
      if(d.clientes) state.clientes=d.clientes;
      if(d.lancamentos) state.lancamentos=d.lancamentos;
      if(d.produtos) state.produtos=d.produtos;
      if(d.lembretesEnviados) state.lembretesEnviados=d.lembretesEnviados;
      if(d.notifAlteracao) state.notifAlteracao=d.notifAlteracao;
      if(d.config) state.config=d.config;
      if(d.notas!==undefined){ state.notas=d.notas; LS.set(PFX+'notas',state.notas); if(db) dadosCol().doc('notas').set({value:state.notas}).catch(()=>{}); }
      ['agendamentos','clientes','lancamentos','produtos','lembretesEnviados','notifAlteracao'].forEach(k=>save(k));
      saveConfig(); migrarDados(); render();
      alert('✅ Backup restaurado com sucesso!');
    }catch(err){ alert('❌ Arquivo inválido. Verifique se é um backup gerado por este sistema.'); }
  };
  r.readAsText(file);
}

async function criarFuncionario(){
  const nome = document.getElementById('fn-nome').value.trim();
  const email = document.getElementById('fn-email').value.trim();
  const senha = document.getElementById('fn-senha').value;
  const barbeiro = document.getElementById('fn-barb').value.trim();
  if(!nome||!email||senha.length<6){ alert('Preencha todos os campos. Senha mínimo 6 caracteres.'); return; }
  try{
    // cria o usuário sem deslogar o dono
    const resp = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${firebaseConfig.apiKey}`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password:senha, returnSecureToken:true})
    });
    const data = await resp.json();
    if(data.error){ alert('Erro: '+(data.error.message||'Tente novamente.')); return; }
    // salva o role + barbeiro no Firestore
    await db.collection('usuarios').doc(data.localId).set({ nome, email, role:'funcionario', lojaId: lojaId, barbeiro: barbeiro||'', criadoEm: Date.now() });
    closeModal();
    alert(`✅ Funcionário ${nome} cadastrado!\nEle já pode entrar com o email e senha definidos.`+(barbeiro?`\n\nAgenda vinculada: ${barbeiro}`:''));
  } catch(e){ alert('Erro ao cadastrar: '+e.message); }
}
/* ============ AUTO-BACKUP LOCAL DIÁRIO + ALERTA FIREBASE ============ */

function autoBackupDiario() {
  try {
    const hoje = todayStr();
    if (LS.get(PFX+'autobackup:ultima') === hoje) return;
    const snapshot = JSON.stringify({
      clientes: state.clientes, agendamentos: state.agendamentos,
      lancamentos: state.lancamentos, produtos: produtosSemFoto(state.produtos),
      lembretesEnviados: state.lembretesEnviados, notifAlteracao: state.notifAlteracao,
      notas: state.notas, config: state.config, pacotes: state.pacotes,
      geradoEm: new Date().toISOString()
    });
    LS.set(PFX+'autobackup:' + hoje, snapshot);
    LS.set(PFX+'autobackup:ultima', hoje);
    for (let i = 8; i <= 30; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const iso = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      try { localStorage.removeItem(PFX+'autobackup:' + iso); } catch(e) {}
    }
    console.info('[AutoBackup] Salvo:', hoje);
  } catch(e) { console.warn('[AutoBackup]', e); }
}

function listarAutoBackups() {
  const backups = [];
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith(PFX+'autobackup:2'))
        backups.push({ key, data: key.replace(PFX+'autobackup:', '') });
    }
  } catch(e) {}
  return backups.sort((a, b) => b.data.localeCompare(a.data));
}

function restaurarAutoBackup(key) {
  try {
    const raw = localStorage.getItem(key);
    const snap = raw ? JSON.parse(raw) : null;
    if (!snap || !snap.agendamentos) { alert('Backup inválido ou corrompido.'); return; }
    const dataFmt = snap.geradoEm ? fmtDate(snap.geradoEm.slice(0,10)) : key.replace(PFX+'autobackup:','');
    if (!confirm(
      'Restaurar backup de ' + dataFmt + '?\n\n' +
      'Agendamentos: ' + (snap.agendamentos?.length||0) + '\n' +
      'Clientes: ' + (snap.clientes?.length||0) + '\n' +
      'Lançamentos: ' + (snap.lancamentos?.length||0) + '\n\n' +
      'Os dados atuais serão substituídos.'
    )) return;
    if (snap.clientes)          state.clientes = snap.clientes;
    if (snap.agendamentos)      state.agendamentos = snap.agendamentos;
    if (snap.lancamentos)       state.lancamentos = snap.lancamentos;
    if (snap.produtos)          state.produtos = snap.produtos;
    if (snap.lembretesEnviados) state.lembretesEnviados = snap.lembretesEnviados;
    if (snap.notifAlteracao)    state.notifAlteracao = snap.notifAlteracao;
    if (snap.notas !== undefined){ state.notas = snap.notas; LS.set(PFX+'notas', state.notas); if(db) dadosCol().doc('notas').set({value:state.notas}).catch(()=>{}); }
    if (snap.config)            state.config = snap.config;
    if (snap.pacotes)           state.pacotes = snap.pacotes;
    ['clientes','agendamentos','lancamentos','produtos','lembretesEnviados','notifAlteracao','pacotes'].forEach(k => save(k));
    saveConfig(); migrarDados(); render();
    alert('✅ Backup de ' + dataFmt + ' restaurado!');
  } catch(e) { alert('❌ Erro: ' + e.message); }
}

function modalAutoBackups() {
  const lista = listarAutoBackups();
  const rows = lista.length ? lista.map(function(b) {
    let info = '';
