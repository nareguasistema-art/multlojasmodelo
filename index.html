const GDRIVE_CLIENT_ID = '342965780941-5ufslul60s44u4hm0qirakklehv7ulmj.apps.googleusercontent.com';
const GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
let _gdriveToken = null;
let _gdriveTokenExpiry = 0;

function gdriveTokenValido() {
  return _gdriveToken && Date.now() < _gdriveTokenExpiry;
}

function autenticarGDrive() {
  return new Promise(function(resolve, reject) {
    if (gdriveTokenValido()) { resolve(_gdriveToken); return; }
    // Carrega a lib do Google se ainda não carregou
    function abrirPopup() {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: GDRIVE_CLIENT_ID,
        scope: GDRIVE_SCOPE,
        callback: function(resp) {
          if (resp.error) { reject(resp.error); return; }
          _gdriveToken = resp.access_token;
          _gdriveTokenExpiry = Date.now() + (resp.expires_in - 60) * 1000;
          resolve(_gdriveToken);
        }
      });
      client.requestAccessToken({ prompt: 'consent' });
    }
    if (typeof google !== 'undefined' && google.accounts) {
      abrirPopup();
    } else {
      const script = document.createElement('script');
      script.src = 'https://accounts.google.com/gsi/client';
      script.onload = abrirPopup;
      script.onerror = function() { reject('Falha ao carregar Google Auth'); };
      document.head.appendChild(script);
    }
  });
}

async function salvarNoGDrive() {
  // Fecha o popup de aviso se existir
  const aviso = document.getElementById('gdrive-aviso');
  if (aviso) aviso.remove();

  // Mostra loading
  const loading = document.createElement('div');
  loading.id = 'gdrive-loading';
  loading.style.cssText = 'position:fixed;bottom:24px;right:16px;left:16px;max-width:360px;margin:0 auto;background:#141414;border:1px solid #C9A84C50;border-radius:14px;padding:16px 20px;z-index:7000;box-shadow:0 8px 32px rgba(0,0,0,.7);display:flex;align-items:center;gap:12px';
  loading.innerHTML = '<div style="width:20px;height:20px;border:2px solid #252525;border-top-color:#C9A84C;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0"></div>'
    + '<div style="font-size:13px;color:#F5F5F5">Conectando ao Google Drive...</div>';
  document.body.appendChild(loading);

  try {
    const token = await autenticarGDrive();

    // Atualiza loading
    const loadingEl = document.getElementById('gdrive-loading');
    if (loadingEl) loadingEl.querySelector('div:last-child').textContent = 'Salvando backup...';

    // Monta o arquivo JSON
    const ontem = new Date(); ontem.setDate(ontem.getDate() - 0);
    const dataStr = ontem.getFullYear() + '-'
      + String(ontem.getMonth()+1).padStart(2,'0') + '-'
      + String(ontem.getDate()).padStart(2,'0');

    const dados = {
      clientes: state.clientes,
      agendamentos: state.agendamentos,
      lancamentos: state.lancamentos,
      produtos: produtosSemFoto(state.produtos),
      lembretesEnviados: state.lembretesEnviados,
      notifAlteracao: state.notifAlteracao,
      notas: state.notas,
      config: state.config,
      pacotes: state.pacotes,
      geradoEm: new Date().toISOString(),
      versao: VERSAO
    };
    const conteudo = JSON.stringify(dados, null, 2);
    const nomeArquivo = 'backup-ceribelli-' + dataStr + '.json';

    // Verifica se já existe pasta "Backups Barbearia"
    let pastaId = null;
    const buscaPasta = await fetch(
      'https://www.googleapis.com/drive/v3/files?q=name%3D%22Backups%20Barbearia%22%20and%20mimeType%3D%22application%2Fvnd.google-apps.folder%22%20and%20trashed%3Dfalse&fields=files(id)',
      { headers: { Authorization: 'Bearer ' + token } }
    );
    const resPasta = await buscaPasta.json();
    if (resPasta.files && resPasta.files.length > 0) {
      pastaId = resPasta.files[0].id;
    } else {
      // Cria a pasta
      const criaPasta = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: 'Backups Barbearia', mimeType: 'application/vnd.google-apps.folder' })
      });
      const novaPasta = await criaPasta.json();
      pastaId = novaPasta.id;
    }

    // Verifica se já existe arquivo com esse nome (para substituir)
    const buscaArq = await fetch(
      'https://www.googleapis.com/drive/v3/files?q=name%3D%22' + nomeArquivo + '%22%20and%20trashed%3Dfalse&fields=files(id)',
      { headers: { Authorization: 'Bearer ' + token } }
    );
    const resArq = await buscaArq.json();
    let arqId = resArq.files && resArq.files.length > 0 ? resArq.files[0].id : null;

    // Upload multipart
    const boundary = 'backup_ceribelli_boundary';
    const metadados = arqId ? {} : { name: nomeArquivo, parents: [pastaId] };
    const body = arqId
      ? new Blob([conteudo], { type: 'application/json' })
      : new Blob([
          '--' + boundary + '\r\n',
          'Content-Type: application/json\r\n\r\n',
          JSON.stringify(metadados) + '\r\n',
          '--' + boundary + '\r\n',
          'Content-Type: application/json\r\n\r\n',
          conteudo + '\r\n',
          '--' + boundary + '--'
        ], { type: 'multipart/related; boundary=' + boundary });

    const url = arqId
      ? 'https://www.googleapis.com/upload/drive/v3/files/' + arqId + '?uploadType=media'
      : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';

    const upload = await fetch(url, {
      method: arqId ? 'PATCH' : 'POST',
      headers: {
        Authorization: 'Bearer ' + token,
        ...(arqId ? { 'Content-Type': 'application/json' } : { 'Content-Type': 'multipart/related; boundary=' + boundary })
      },
      body: body
    });

    const resultado = await upload.json();
    const loadingEl2 = document.getElementById('gdrive-loading');
    if (loadingEl2) loadingEl2.remove();

    if (resultado.id) {
      // Registra que o backup foi feito hoje
      LS.set(PFX+'gdrive-backup-data', dataStr);
      // Mostra sucesso
      const ok = document.createElement('div');
      ok.style.cssText = 'position:fixed;bottom:24px;right:16px;left:16px;max-width:360px;margin:0 auto;background:#052E16;border:1px solid #22C55E50;border-radius:14px;padding:16px 20px;z-index:7000;box-shadow:0 8px 32px rgba(0,0,0,.7);display:flex;align-items:center;gap:12px';
      ok.innerHTML = '<div style="font-size:22px;flex-shrink:0">✅</div>'
        + '<div><div style="font-weight:700;font-size:13px;color:#22C55E;margin-bottom:3px">Backup salvo no Google Drive!</div>'
        + '<div style="font-size:12px;color:#9CA3AF">Pasta: Backups Barbearia / ' + nomeArquivo + '</div></div>'
        + '<button onclick="this.parentElement.remove()" style="background:none;border:none;color:#6B7280;font-size:18px;cursor:pointer;flex-shrink:0;margin-left:auto">×</button>';
      document.body.appendChild(ok);
      setTimeout(function() { if (ok.parentElement) ok.remove(); }, 6000);
    } else {
      throw new Error('Upload falhou: ' + JSON.stringify(resultado));
    }

  } catch(err) {
    const loadingEl3 = document.getElementById('gdrive-loading');
    if (loadingEl3) loadingEl3.remove();
    console.error('[GDrive]', err);
    alert('❌ Erro ao salvar no Google Drive:\n' + (err.message || err));
  }
}

function mostrarAvisoGDrive() {
  // Mostra apenas após as 21h, uma vez por dia
  const agora = new Date();
  if (agora.getHours() < 21) return; // só após as 21h

  const hoje = agora.getFullYear() + '-'
    + String(agora.getMonth()+1).padStart(2,'0') + '-'
    + String(agora.getDate()).padStart(2,'0');

  const jaFezHoje = LS.get(PFX+'gdrive-backup-data') === hoje;
  const jaViuHoje = LS.get(PFX+'gdrive-aviso-data') === hoje;
  if (jaFezHoje || jaViuHoje) return;

  LS.set(PFX+'gdrive-aviso-data', hoje);

  setTimeout(function() {
    if (document.getElementById('gdrive-aviso')) return;
    const div = document.createElement('div');
    div.id = 'gdrive-aviso';
    div.style.cssText = 'position:fixed;bottom:24px;right:16px;left:16px;max-width:380px;margin:0 auto;background:#141414;border:1px solid #C9A84C60;border-radius:14px;padding:16px;z-index:7000;box-shadow:0 8px 32px rgba(0,0,0,.8);display:flex;gap:12px;align-items:flex-start';
    div.innerHTML = '<div style="font-size:26px;flex-shrink:0;line-height:1">☁️</div>'
      + '<div style="flex:1">'
      + '<div style="font-weight:700;font-size:13px;margin-bottom:4px;color:#F5F5F5">Backup noturno no Google Drive</div>'
      + '<div style="font-size:12px;color:#9CA3AF;margin-bottom:14px">Já passou das 21h — hora de salvar o backup de hoje no Drive. Leva só alguns segundos.</div>'
      + '<div style="display:flex;gap:8px;flex-wrap:wrap">'
      + '<button onclick="salvarNoGDrive()" style="background:#C9A84C;border:none;border-radius:7px;padding:9px 18px;font-size:13px;font-weight:700;color:#0A0A0A;cursor:pointer">☁️ Salvar no Drive</button>'
      + '<button onclick="document.getElementById(\'gdrive-aviso\').remove()" style="background:transparent;border:1px solid #252525;border-radius:7px;padding:9px 14px;font-size:12px;color:#6B7280;cursor:pointer">Agora não</button>'
      + '</div></div>'
      + '<button onclick="document.getElementById(\'gdrive-aviso\').remove()" style="background:none;border:none;color:#6B7280;font-size:20px;cursor:pointer;flex-shrink:0;line-height:1;padding:0">×</button>';
    document.body.appendChild(div);
  }, 3000);
}


/* ============ INIT ============ */
async function boot(){
  migrarDados();
  autoBackupDiario();
  mostrarAvisoBackup();
  applyTema();
  aplicarCorLoja();
  aplicarIconesMarca();
  // loading state
  const viewEl=document.getElementById('view');
  if(viewEl) viewEl.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:14px"><div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite"></div><p style="font-size:13px;color:var(--text-3)">Carregando...</p></div>`;
  if(db){
    setCloudStatus('☁️ Carregando...','#9CA3AF');
    try{
      const snap = await dadosCol().get();
      if(!snap.empty){
        const localPrds = LS.get(PFX+'produtos') || [];
        snap.forEach(doc=>{
          const d=doc.data();
          if(doc.id==='config'){ if(d&&d.value) state.config=d.value; }
          else if(doc.id==='notas'){ if(d&&d.value!==undefined) state.notas=d.value; }
          else if(doc.id==='produtos'&&d&&d.items){
            // mescla fotos do localStorage (não salvas no Firebase por tamanho)
            state.produtos=d.items.map(p=>{ const loc=localPrds.find(lp=>lp.id===p.id); return loc?.fotoUrl?{...p,fotoUrl:loc.fotoUrl}:p; });
          }
          else if(d&&d.items) state[doc.id]=d.items;
        });
        migrarDados();
        ['clientes','agendamentos','lancamentos','produtos','lembretesEnviados','notifAlteracao','pacotes'].forEach(k=>LS.set(PFX+''+k,state[k]));
        LS.set(PFX+'config',state.config);
        LS.set(PFX+'notas',state.notas);
      } else {
        // Primeira vez: envia dados locais para a nuvem
        ['clientes','agendamentos','lancamentos','produtos','lembretesEnviados','notifAlteracao','pacotes'].forEach(k=>save(k));
        saveConfig();
        if(state.notas) dadosCol().doc('notas').set({value:state.notas}).catch(()=>{});
      }
      setCloudStatus('☁️ Firebase sincronizado','#22C55E');
    }catch(e){
      console.warn('Firebase load:',e);
      setCloudStatus('⚠️ Sem conexão — dados locais','#F59E0B');
    }
  } else if(SB_URL && SB_URL.length>10){
    setCloudStatus('☁️ Carregando Supabase...','#9CA3AF');
    const ok = await cloudLoad();
    setCloudStatus(ok?'☁️ Supabase sincronizado':'⚠️ Sem conexão — dados locais', ok?'#22C55E':'#F59E0B');
  }
  aplicarCorLoja();
  aplicarIconesMarca();
  render();
  // Verificar notificações a cada 60 segundos
  verificarNotificacoes();
  setInterval(verificarNotificacoes, 60000);
  mostrarAvisoGDrive();
  setTimeout(verificarConexaoFirebase, 4000);
  setInterval(verificarConexaoFirebase, 5 * 60 * 1000);
}
window.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal(); closeDrawer(); if(_modoOpAtivo)toggleModoOp(); } });

/* ============ MODO OPERAÇÃO ============ */
let _modoOpAtivo=false;
let _modoOpInterval=null;
let _modoOpBarb=''; // barbeiro selecionado no modo operação
function toggleModoOp(){
  _modoOpAtivo=!_modoOpAtivo;
  const ov=document.getElementById('modo-op-overlay');
  if(_modoOpAtivo){
    // funcionário: sempre usa o barbeiro vinculado; dono herda da timeline ou deixa escolher
    const barbs=state.config.barbeiros||[];
    if(!_modoOpBarb){
      // dono ou funcionário: usa o barbeiro vinculado ao perfil
      if(currentBarbeiro){
        _modoOpBarb = currentBarbeiro;
      } else {
        _modoOpBarb = agTimelineBarb || (barbs.length===1 ? barbs[0] : '');
      }
    }
    ov.style.display='flex';
    renderModoOp();
    _modoOpInterval=setInterval(()=>{
      const h=document.getElementById('modo-op-hora');
      if(h){ const n=new Date(); h.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); }
    },15000);
  } else {
    ov.style.display='none';
    clearInterval(_modoOpInterval);
  }
  const btn=document.getElementById('btn-modo-op');
  if(btn) btn.innerHTML=_modoOpAtivo?ICON.x(18,'#EF4444'):iconeMarca(18,'#C9A84C');
}
function modoOpSelecionarBarb(b){
  _modoOpBarb=b;
  renderModoOp();
}
function modoOpConcluir(id){
  // Chama a comanda de concluir existente — overlay fica embaixo do modal
  modalConcluir(id);
}
function renderModoOp(){
  const ov=document.getElementById('modo-op-overlay'); if(!ov) return;
  const agora=new Date();
  const agoraStr=todayStr();
  const horaStr=String(agora.getHours()).padStart(2,'0')+':'+String(agora.getMinutes()).padStart(2,'0');
  const barbs=(state.config.barbeiros||[]);
  const temMultBarbs=barbs.length>1;

  // Filtra agenda do barbeiro selecionado (ou todos se não houver seleção)
  const proximos=state.agendamentos
    .filter(a=>a.status==='agendado'&&a.data===agoraStr&&(!_modoOpBarb||a.barbeiro===_modoOpBarb))
    .sort((a,b)=>a.hora>b.hora?1:-1);
  const prox=proximos[0]||null;
  const barbearia=(state.config.barbearia&&state.config.barbearia.nome)||'Barbearia';

  // Tabs de barbeiros (só mostra se tiver mais de 1)
  const barbTabs=temMultBarbs
    ? '<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:20px">'
        +barbs.map(b=>{
          const qtd=state.agendamentos.filter(a=>a.status==='agendado'&&a.data===agoraStr&&a.barbeiro===b).length;
          const ativo=_modoOpBarb===b;
          return '<button onclick="modoOpSelecionarBarb(\''+esc(b)+'\')" style="padding:7px 16px;border-radius:20px;border:2px solid '+(ativo?'var(--gold)':'var(--border)')+';background:'+(ativo?'rgba(201,168,76,.15)':'transparent')+';color:'+(ativo?'var(--gold)':'var(--text-3)')+';font-size:13px;font-weight:700;cursor:pointer;transition:all .15s">'
            +esc(b)+(qtd>0?' <span style="font-size:11px;opacity:.75">('+qtd+')</span>':'')
            +'</button>';
        }).join('')
        +'<button onclick="modoOpSelecionarBarb(\'\')" style="padding:7px 16px;border-radius:20px;border:2px solid '+(_modoOpBarb===''?'var(--gold)':'var(--border)')+';background:'+(_modoOpBarb===''?'rgba(201,168,76,.15)':'transparent')+';color:'+(_modoOpBarb===''?'var(--gold)':'var(--text-3)')+';font-size:13px;font-weight:700;cursor:pointer">Todos</button>'
        +'</div>'
    : '';

  ov.innerHTML=
    // Topbar
    '<div style="position:absolute;top:0;left:0;right:0;padding:env(safe-area-inset-top,0) 16px 0;height:calc(52px + env(safe-area-inset-top,0px));background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:10px">'
      +'<div style="display:flex;align-items:center;gap:6px">'+iconeMarca(16,'#C9A84C')+'<span style="font-size:13px;font-weight:700;color:var(--gold)">'+esc(barbearia)+'</span></div>'
      +'<button onclick="toggleModoOp()" style="background:var(--red-bg);border:1px solid var(--red);border-radius:8px;padding:5px 14px;color:var(--red);cursor:pointer;font-size:12px;font-weight:700">✕ Sair</button>'
    +'</div>'
    // Conteúdo central
    +(prox
      ? '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;width:100%;padding:0 24px;padding-top:52px;gap:0">'
          +barbTabs
          +'<div style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.16em;margin-bottom:6px">Próximo cliente'+(temMultBarbs&&_modoOpBarb?' · '+esc(_modoOpBarb):'')+'</div>'
          +'<div id="modo-op-hora" style="font-size:min(72px,18vw);font-weight:700;color:var(--gold);line-height:1;margin-bottom:10px">'+horaStr+'</div>'
          +'<div style="font-size:min(36px,8vw);font-weight:700;text-align:center;margin-bottom:6px;line-height:1.1">'+esc(prox.clienteNome)+(prox.isWalkIn?' ⚡':'')+'</div>'
          +'<div style="font-size:min(20px,5vw);color:var(--text-2);margin-bottom:4px">'+esc(prox.servico)+'</div>'
          // Hora do agendamento
          +'<div style="font-size:14px;color:var(--text-3);margin-bottom:28px">🕐 '+esc(prox.hora)+((!_modoOpBarb&&prox.barbeiro)?' · ✂️ '+esc(prox.barbeiro):'')+'</div>'
          +'<button onclick="modoOpConcluir(\''+prox.id+'\')" style="width:100%;max-width:340px;background:var(--green);border:none;border-radius:16px;padding:18px 24px;font-size:20px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 4px 24px rgba(34,197,94,.35);letter-spacing:.01em">✓ Concluir atendimento</button>'
          +(proximos.length>1
            ?'<div style="margin-top:22px;font-size:13px;color:var(--text-3);text-align:center">A seguir: <strong style="color:var(--text)">'+esc(proximos[1].hora)+' · '+esc(proximos[1].clienteNome)+'</strong>'+(proximos.length>2?' <span style="color:var(--text-3)">+mais '+(proximos.length-2)+'</span>':'')+'</div>'
            :'')
        +'</div>'
      : '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;padding-top:52px">'
          +barbTabs
          +'<div style="font-size:48px">✂️</div>'
          +'<div style="font-size:20px;font-weight:700;color:var(--text-3)">Agenda limpa'+(temMultBarbs&&_modoOpBarb?' — '+esc(_modoOpBarb):'')+'!</div>'
          +'<div style="font-size:14px;color:var(--text-3)">Nenhum agendamento pendente hoje</div>'
          +'<span id="modo-op-hora" style="display:none">'+horaStr+'</span>'
        +'</div>'
    );
}

setTimeout(()=>{ const btn=document.getElementById('btn-modo-op'); if(btn) btn.innerHTML=iconeMarca(18,'#C9A84C'); },150);
</script>
